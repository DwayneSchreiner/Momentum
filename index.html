<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Momentum">
<title>Momentum</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #F2EEE7;
  --card:   #FDFCF9;
  --card2:  #F7F3EC;
  --ink:    #18160F;
  --ink2:   #3A3728;
  --muted:  #8A8370;
  --dim:    #B5AFA0;
  --orange: #D95F1A;
  --og-l:   rgba(217,95,26,0.10);
  --og-m:   rgba(217,95,26,0.22);
  --green:  #2E7D52;
  --gn-l:   rgba(46,125,82,0.10);
  --red:    #B83232;
  --rd-l:   rgba(184,50,50,0.10);
  --bo:     rgba(24,22,15,0.08);
  --bm:     rgba(24,22,15,0.14);
  --sh:     0 1px 12px rgba(24,22,15,0.07);
  --shm:    0 6px 30px rgba(24,22,15,0.12);
  --r:      14px;
  --rs:     9px;
  --rx:     6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

/* ── TOP BAR ── */
.bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 12px; background: var(--bg); border-bottom: 1px solid var(--bo); flex-shrink: 0; }
.logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -.03em; color: var(--ink); }
.logo b { color: var(--orange); font-weight: 800; }
.bar-btn { display: flex; align-items: center; gap: 5px; padding: 7px 15px; border-radius: 100px; border: 1.5px solid var(--bm); background: transparent; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .18s; }
.bar-btn:hover, .bar-btn.active { border-color: var(--orange); color: var(--orange); background: var(--og-l); }
.bar-btn .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); flex-shrink: 0; }

/* ── SCROLL ── */
.scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.scroll::-webkit-scrollbar { display: none; }
.pg { padding: 0 0 110px; }

/* ── QUOTE STRIP ── */
.q-strip { margin: 16px 16px 0; background: var(--ink); border-radius: var(--r); padding: 20px 20px 18px; position: relative; overflow: hidden; }
.q-strip::after { content: '"'; position: absolute; bottom: -14px; right: 14px; font-family: 'Syne', sans-serif; font-size: 100px; font-weight: 800; color: rgba(255,255,255,0.05); line-height: 1; pointer-events: none; }
.q-tag { font-size: 10px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--orange); margin-bottom: 10px; }
.q-text { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; line-height: 1.5; color: #fff; letter-spacing: -.01em; }
.q-auth { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 10px; font-style: normal; font-weight: 300; }

/* ── GREETING ── */
.greet { padding: 18px 18px 0; }
.greet-name { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -.03em; color: var(--ink); line-height: 1; }
.greet-name span { color: var(--orange); }
.greet-sub { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 300; }

/* ── DATE ROW ── */
.date-row { padding: 14px 16px 0; display: flex; align-items: center; justify-content: space-between; }
.date-wrap { position: relative; }
.date-btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 15px; border-radius: 100px; border: 1.5px solid var(--bm); background: var(--card); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--ink); cursor: pointer; box-shadow: var(--sh); letter-spacing: -.01em; }
.date-btn .d-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--orange); }
.date-btn .d-arr { font-size: 9px; color: var(--muted); }
.date-dropdown { position: absolute; top: calc(100% + 8px); left: 0; background: var(--card); border: 1px solid var(--bm); border-radius: var(--rs); box-shadow: var(--shm); z-index: 100; min-width: 210px; overflow: hidden; }
.date-opt { width: 100%; padding: 11px 16px; border: none; border-bottom: 1px solid var(--bo); background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); cursor: pointer; text-align: left; display: flex; align-items: center; justify-content: space-between; gap: 8px; transition: background .12s; }
.date-opt:hover { background: var(--bg); }
.date-opt.cur { background: var(--og-l); color: var(--orange); font-weight: 500; }
.date-opt:last-child { border-bottom: none; }
.date-count { font-size: 10px; color: var(--muted); }
.date-count.done { color: var(--green); }
.prog-line { flex: 1; height: 3px; background: var(--card2); border-radius: 100px; overflow: hidden; margin-left: 8px; }
.prog-line-fill { height: 100%; background: var(--orange); border-radius: 100px; transition: width .4s ease; }

/* ── TASK CARDS ── */
.day-section { margin: 10px 16px 0; }
.day-header { background: var(--card); border-radius: var(--r) var(--r) 0 0; border: 1px solid var(--bo); border-bottom: none; padding: 14px 16px 12px; }
.day-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.day-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--ink); letter-spacing: -.01em; }
.day-badge { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 100px; }
.badge-done { background: var(--gn-l); color: var(--green); }
.badge-prog { background: var(--og-l); color: var(--orange); }
.task-block { background: var(--card); border: 1px solid var(--bo); border-top: none; overflow: hidden; }
.task-block:last-of-type { border-radius: 0 0 var(--r) var(--r); }
.task-item { padding: 16px 16px 14px; border-bottom: 1px solid var(--bo); }
.task-item:last-child { border-bottom: none; }
.task-subject { font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--dim); margin-bottom: 5px; }
.task-name { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: var(--ink); letter-spacing: -.02em; line-height: 1.3; margin-bottom: 4px; }
.task-hint { font-size: 12px; color: var(--muted); margin-bottom: 10px; font-weight: 300; }
.ph-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
.ph-img { width: 48px; height: 48px; border-radius: var(--rx); object-fit: cover; border: 1px solid var(--bo); cursor: pointer; }
.done-btn { width: 100%; padding: 12px; background: var(--orange); color: #fff; border: none; border-radius: 100px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: .02em; box-shadow: 0 3px 12px rgba(217,95,26,0.28); transition: all .15s; }
.done-btn:active { transform: scale(.98); }

/* ── EMPTY DAY STATE ── */
.day-done-state { background: var(--card); border: 1px solid var(--bo); border-top: none; border-radius: 0 0 var(--r) var(--r); padding: 24px 16px; text-align: center; }
.day-done-icon { font-size: 30px; margin-bottom: 8px; }
.day-done-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--green); margin-bottom: 4px; }
.day-done-sub { font-size: 12px; color: var(--muted); }

/* ── ADD TASK ── */
.add-task-btn { display: flex; align-items: center; gap: 10px; padding: 13px 16px; margin: 8px 16px 0; border: 1.5px dashed var(--bm); border-radius: var(--rs); background: transparent; cursor: pointer; width: calc(100% - 32px); transition: all .15s; }
.add-task-btn:hover { border-color: var(--orange); background: var(--og-l); }
.add-task-btn span { font-size: 13px; color: var(--muted); font-weight: 400; }
.add-ico { width: 24px; height: 24px; border-radius: 50%; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--muted); flex-shrink: 0; transition: all .15s; }
.add-task-btn:hover .add-ico { background: var(--orange); color: #fff; }
input[type=file] { display: none; }

/* ── AFGEROND SECTION ── */
.afgerond-btn { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; margin: 8px 16px 0; border: 1.5px solid var(--bm); border-radius: var(--rs); background: transparent; cursor: pointer; width: calc(100% - 32px); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--muted); transition: all .15s; }
.afgerond-btn:hover { border-color: var(--green); color: var(--green); }
.afgerond-list { margin: 6px 16px 0; background: var(--card); border-radius: var(--rs); border: 1px solid var(--bo); overflow: hidden; box-shadow: var(--sh); }
.done-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--bo); }
.done-item:last-child { border-bottom: none; }
.done-chk { width: 20px; height: 20px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; cursor: pointer; }
.done-body { flex: 1; }
.done-day-label { font-size: 10px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--dim); margin-bottom: 2px; }
.done-name { font-size: 13px; font-weight: 500; color: var(--dim); text-decoration: line-through; }
.done-note { font-size: 11px; color: var(--dim); margin-top: 2px; }
.done-photos { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }

/* ── MESSAGES ── */
.msg-sec { margin: 16px 16px 0; }
.sec-label { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--bm); }
.msg-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.msg-b { padding: 10px 14px; border-radius: 13px; font-size: 13px; line-height: 1.5; max-width: 85%; font-weight: 400; }
.msg-coach { background: var(--ink); color: #fff; align-self: flex-end; border-bottom-right-radius: 3px; font-weight: 500; }
.msg-system { background: var(--card); color: var(--muted); align-self: flex-start; border: 1px solid var(--bm); border-bottom-left-radius: 3px; font-style: italic; }

/* ── FORM SHEET (inline) ── */
.form-card { margin: 10px 16px 0; background: var(--card); border-radius: var(--r); border: 1px solid var(--bm); padding: 18px; box-shadow: var(--shm); }
.form-ttl { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--orange); margin-bottom: 12px; }
.f-in { width: 100%; padding: 11px 13px; border: 1.5px solid var(--bm); border-radius: var(--rs); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); outline: none; margin-bottom: 9px; transition: border-color .15s; }
.f-in:focus { border-color: var(--orange); background: var(--card); }
.f-in::placeholder { color: var(--dim); }
textarea.f-in { resize: none; height: 76px; font-family: 'DM Sans', sans-serif; }
.btns { display: flex; gap: 8px; margin-top: 4px; }
.btn-ok { padding: 10px 20px; background: var(--orange); color: #fff; border: none; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; box-shadow: 0 3px 12px rgba(217,95,26,0.26); transition: all .18s; }
.btn-ok:hover { transform: translateY(-1px); }
.btn-no { padding: 10px 16px; background: transparent; color: var(--muted); border: 1.5px solid var(--bm); border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; }

/* ── COMPLETION DRAWER ── */
.drawer-bg { position: fixed; inset: 0; background: rgba(24,22,15,0.55); z-index: 200; display: flex; align-items: flex-end; }
.drawer { background: var(--card); border-radius: 20px 20px 0 0; padding: 20px 20px 44px; width: 100%; max-width: 500px; margin: 0 auto; }
.drawer-handle { width: 36px; height: 4px; background: var(--bm); border-radius: 2px; margin: 0 auto 18px; }
.drawer-tag { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--orange); margin-bottom: 6px; }
.drawer-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--ink); margin-bottom: 18px; letter-spacing: -.02em; line-height: 1.3; }
.drawer-label { font-size: 11px; font-weight: 500; color: var(--muted); margin-bottom: 7px; letter-spacing: .04em; }
.drawer-photos { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.drawer-ph { width: 56px; height: 56px; border-radius: var(--rx); object-fit: cover; border: 1px solid var(--bo); cursor: pointer; }
.drawer-add-ph { width: 56px; height: 56px; border-radius: var(--rx); border: 1.5px dashed var(--bm); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; color: var(--dim); cursor: pointer; font-size: 18px; transition: all .15s; }
.drawer-add-ph:hover { border-color: var(--orange); color: var(--orange); }
.drawer-add-ph small { font-size: 8px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }
.confirm-btn { width: 100%; padding: 14px; background: var(--ink); color: #fff; border: none; border-radius: 100px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: .02em; box-shadow: 0 4px 16px rgba(24,22,15,0.2); transition: all .15s; margin-top: 4px; }
.confirm-btn:active { transform: scale(.98); }

/* ── TOAST ── */
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 12px 22px; border-radius: 100px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; z-index: 300; white-space: nowrap; box-shadow: var(--shm); animation: fadeUp .28s ease; pointer-events: none; }
@keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* ── COACH STATS ── */
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 16px 16px 0; max-width: 800px; }
.stat { background: var(--card); border: 1px solid var(--bo); border-radius: var(--rs); padding: 14px 10px; text-align: center; box-shadow: var(--sh); }
.stat-n { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--orange); line-height: 1; letter-spacing: -.02em; }
.stat-l { font-size: 10px; color: var(--dim); margin-top: 4px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; }

/* ── OVERVIEW GRID ── */
.ov-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 8px; margin: 12px 16px 0; max-width: 800px; }
.ov-tile { background: var(--card); border: 1px solid var(--bo); border-left: 3px solid var(--card2); border-radius: var(--rs); padding: 12px; cursor: pointer; transition: all .18s; box-shadow: var(--sh); }
.ov-tile:hover { transform: translateY(-2px); box-shadow: var(--shm); }
.ov-tile.t-prog { border-left-color: var(--orange); }
.ov-tile.t-done { border-left-color: var(--green); }
.ov-tile-date { font-size: 10px; color: var(--dim); font-weight: 500; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 4px; }
.ov-tile-title { font-size: 12px; font-weight: 600; color: var(--ink); line-height: 1.3; margin-bottom: 8px; }
.ov-bar { height: 2px; background: var(--card2); border-radius: 1px; margin-bottom: 4px; overflow: hidden; }
.ov-bar-fill { height: 100%; background: var(--orange); border-radius: 1px; }
.ov-tile.t-done .ov-bar-fill { background: var(--green); }
.ov-count { font-size: 10px; color: var(--muted); }
.ov-actions { display: flex; gap: 5px; margin-top: 8px; }
.ov-act-btn { flex: 1; padding: 5px 0; font-size: 11px; font-weight: 600; border-radius: var(--rx); border: 1px solid var(--bm); background: transparent; cursor: pointer; color: var(--muted); transition: all .15s; font-family: 'DM Sans', sans-serif; }
.ov-act-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--og-l); }
.ov-act-del { flex: 0; padding: 5px 8px; color: var(--muted); border: 1px solid var(--bm); border-radius: var(--rx); background: transparent; cursor: pointer; font-size: 11px; transition: all .15s; }
.ov-act-del:hover { border-color: var(--red); color: var(--red); background: var(--rd-l); }

/* ── EDIT TILE ── */
.edit-tile { background: var(--card); border: 1.5px solid var(--orange); border-radius: var(--rs); padding: 14px; grid-column: 1 / -1; box-shadow: var(--shm); }

/* ── COACH TASKS ── */
.coach-task { display: flex; align-items: flex-start; gap: 12px; padding: 13px 16px; border-bottom: 1px solid var(--bo); }
.coach-task:last-child { border-bottom: none; }
.c-chk { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; cursor: pointer; border: 1.5px solid var(--bm); background: transparent; transition: all .15s; }
.c-chk.on { background: var(--green); border-color: var(--green); }
.coach-task-body { flex: 1; min-width: 0; }
.coach-task-name { font-size: 13px; font-weight: 500; color: var(--ink); }
.coach-task-note { font-size: 11px; color: var(--muted); margin-top: 2px; }
.coach-task-actions { display: flex; gap: 4px; flex-shrink: 0; }
.c-act { width: 28px; height: 28px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--dim); transition: all .15s; }
.c-act:hover { background: var(--og-l); color: var(--orange); }
.c-act.del:hover { background: var(--rd-l); color: var(--red); }

/* ── EDIT TASK INLINE ── */
.edit-task-form { padding: 13px 16px; background: var(--og-l); border-bottom: 1px solid var(--bm); }

/* ── MSG COMPOSE ── */
.msg-compose { margin: 10px 16px 0; display: flex; gap: 8px; align-items: center; }
.msg-in { flex: 1; padding: 11px 16px; border: 1.5px solid var(--bm); border-radius: 100px; background: var(--card); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); outline: none; transition: border-color .15s; box-shadow: var(--sh); }
.msg-in:focus { border-color: var(--orange); }
.msg-in::placeholder { color: var(--dim); }
.send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--orange); border: none; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 3px 12px rgba(217,95,26,0.28); transition: all .18s; }
.send-btn:hover { transform: scale(1.07); }

/* ── ADD DAY ── */
.add-day-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; margin: 8px 16px 0; border: 1.5px dashed var(--bm); border-radius: var(--rs); background: transparent; cursor: pointer; width: calc(100% - 32px); max-width: 800px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); transition: all .15s; }
.add-day-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--og-l); }

/* ── PIN ── */
.pin-pg { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 75vh; padding: 40px 24px; text-align: center; }
.pin-logo { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--orange); margin-bottom: 10px; }
.pin-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -.02em; color: var(--ink); margin-bottom: 6px; }
.pin-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; font-weight: 300; }
.pin-dots { display: flex; gap: 14px; margin-bottom: 32px; }
.pd { width: 13px; height: 13px; border-radius: 50%; border: 2px solid var(--bm); background: transparent; transition: all .18s; }
.pd.on { background: var(--orange); border-color: var(--orange); transform: scale(1.1); }
.pd.err { background: var(--red); border-color: var(--red); }
.pin-grid { display: grid; grid-template-columns: repeat(3, 68px); gap: 9px; justify-content: center; margin-bottom: 12px; }
.pk { width: 68px; height: 58px; background: var(--card); border: 1.5px solid var(--bo); border-radius: var(--rs); font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--ink); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; box-shadow: var(--sh); }
.pk:hover { border-color: var(--orange); color: var(--orange); background: var(--og-l); }
.pk:active { transform: scale(.95); }
.pk.del { font-size: 16px; color: var(--muted); }
.pin-err { font-size: 12px; color: var(--red); font-weight: 500; height: 18px; }

/* ── LIGHTBOX ── */
.lb { position: fixed; inset: 0; background: rgba(24,22,15,0.94); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
.lb img { max-width: 100%; max-height: 90vh; border-radius: var(--rs); object-fit: contain; }
.lb-close { position: fixed; top: 16px; right: 18px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.12); border: none; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.hidden { display: none !important; }

function compressImage(file, maxPx, q) {
  return new Promise((res, rej) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if (w > maxPx || h > maxPx) {
        if (w > h) { h = Math.round(h*maxPx/w); w = maxPx; }
        else { w = Math.round(w*maxPx/h); h = maxPx; }
      }
      const c = document.createElement('canvas');
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg', q));
    };
    img.onerror = rej;
    img.src = url;
  });
}

    ${S.showDayForm?`
    <div class="form-card">
      <div class="form-ttl">Nieuwe dag toevoegen</div>
      <input class="f-in" id="nd-ti" placeholder="Onderwerp (bv. Badkamer: tegels)">
      <input class="f-in" id="nd-da" type="date">
      <input class="f-in" id="nd-t1" placeholder="Taak 1">
      <input class="f-in" id="nd-t2" placeholder="Taak 2 (optioneel)">
      <input class="f-in" id="nd-t3" placeholder="Taak 3 (optioneel)">
      <div class="btns">
        <button class="btn-ok" onclick="saveDay()">Toevoegen</button>
        <button class="btn-no" onclick="S.showDayForm=false;rD()">Annuleren</button>
      </div>
    </div>`:`<button class="add-day-btn" onclick="S.showDayForm=true;rD()">+ Dag toevoegen aan planning</button>`}
    <div style="padding:0 16px;margin-top:16px;max-width:800px">
      <div class="sec-label">Taken — ${day?day.title:''}</div>
    </div>
    <div style="margin:0 16px;background:var(--card);border-radius:var(--rs);border:1px solid var(--bo);overflow:hidden;box-shadow:var(--sh);max-width:800px">
      ${coachTasks}
    </div>
    <div class="msg-sec">
      <div class="sec-label">Stuur een bericht aan Arthur</div>
      <div class="msg-list">${msgsHtml}</div>
    </div>
    <div class="msg-compose">
      <input class="msg-in" id="ci" placeholder="Schrijf een motivatiebericht..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" onclick="sendMsg()">&#10148;</button>
    </div>
  `;
}

// ── PIN ──
window.goBack = () => { pinBuf=""; show('vA'); rA(); };
window.openCoach = () => pinOk ? (rD(), show('vD')) : (pinBuf="", updDots(), show('vP'));
window.pp = d => {
  if (!d||pinBuf.length>=4) return;
  pinBuf+=d; updDots();
  if (pinBuf.length===4) setTimeout(checkPin,150);
};
window.pdel = () => { pinBuf=pinBuf.slice(0,-1); updDots(); $('perr').textContent=''; };
function updDots(err) {
  for(let i=0;i<4;i++){
    $('pd'+i).classList.toggle('on',i<pinBuf.length&&!err);
    $('pd'+i).classList.toggle('err',!!err);
  }
}
function checkPin() {
  if (pinBuf===PIN) { pinOk=true; rD(); show('vD'); }
  else {
    updDots(true); $('perr').textContent='Verkeerde pincode';
    setTimeout(()=>{ pinBuf=""; updDots(); $('perr').textContent=''; },1300);
  }
}

// ── ARTHUR ACTIONS ──
window.toggleDatePicker = () => { S.showDatePicker=!S.showDatePicker; rA(); };
window.pickDay = i => { S.dayIdx=i; S.showDatePicker=false; S.showDone=false; rA(); };

window.startComplete = ti => { S.completing=ti; S.compPhotos=[]; rA(); };
window.cancelComplete = () => { S.completing=null; S.compPhotos=[]; rA(); };
window.addCompPhoto = async input => {
  const files = Array.from(input.files);
  for (const f of files) {
    try { S.compPhotos.push(await compressImage(f,400,.5)); } catch(e){}
  }
  rA();
};
window.confirmComplete = () => {
  const ti = S.completing; if (ti===null) return;
  const task = S.days[S.dayIdx].tasks[ti]; if (!task) return;
  const noteEl = $('c-note');
  if (noteEl&&noteEl.value.trim()) task.note = noteEl.value.trim();
  if (S.compPhotos&&S.compPhotos.length) task.photos=[...(task.photos||[]),...S.compPhotos];
  task.done=true;
  S.completing=null; S.compPhotos=[];
  save();
  const c = COMPLIMENTS[Math.floor(Math.random()*COMPLIMENTS.length)];
  toast(c);
  // Auto-jump if day complete
  setTimeout(()=>{
    if (S.days[S.dayIdx].tasks.every(t=>t.done)) {
      const next = nextOpenDay();
      if (next!==S.dayIdx) setTimeout(()=>{ S.dayIdx=next; rA(); },1000);
    }
  },200);
};

window.toggleTask = ti => { S.days[S.dayIdx].tasks[ti].done=!S.days[S.dayIdx].tasks[ti].done; save(); };
window.toggleTaskDay = (di,ti) => { S.days[di].tasks[ti].done=!S.days[di].tasks[ti].done; save(); };

window.saveTask = () => {
  const title=$('nt-t').value.trim(); if(!title) return;
  const note=$('nt-n').value.trim();
  S.days[S.dayIdx].tasks.push({id:'t'+Date.now(),title,note,done:false,photos:[]});
  S.showTaskForm=false; save();
};

// ── DWAYNE ACTIONS ──
window.jmpDay = i => { S.dayIdx=i; rA(); show('vA'); };
window.editDay = i => { S.editDayIdx=i; S.editTaskIdx=null; rD(); };
window.saveEditDay = i => {
  const ti=$('ed-ti').value.trim(), da=$('ed-da').value.trim();
  if(ti) S.days[i].title=ti; if(da) S.days[i].date=da;
  S.editDayIdx=null; save();
};
window.delDay = i => {
  if(!confirm('Dag "'+S.days[i].title+'" verwijderen?')) return;
  S.days.splice(i,1);
  if(S.dayIdx>=S.days.length) S.dayIdx=Math.max(0,S.days.length-1);
  save();
};
window.saveEditTask = ti => {
  const t=$('et-t').value.trim(), n=$('et-n').value.trim();
  if(t) S.days[S.dayIdx].tasks[ti].title=t;
  S.days[S.dayIdx].tasks[ti].note=n;
  S.editTaskIdx=null; save();
};
window.delTask = ti => { S.days[S.dayIdx].tasks.splice(ti,1); save(); };
window.delMsg = i => { S.msgs.splice(i,1); save(); };
window.saveDay = () => {
  const title=$('nd-ti').value.trim(); if(!title) return;
  const raw=$('nd-da').value;
  let date='Datum volgt';
  if(raw){
    const d=new Date(raw);
    const days=['Zo','Ma','Di','Wo','Do','Vr','Za'];
    const months=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
    date=days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()];
  }
  const tasks=[];
  ['nd-t1','nd-t2','nd-t3'].forEach(id=>{ const v=$(id)?.value.trim(); if(v) tasks.push({id:'t'+Date.now()+Math.random(),title:v,note:'',done:false,photos:[]}); });
  if(!tasks.length) tasks.push({id:'t'+Date.now(),title:'Werkzaamheden invullen',note:'',done:false,photos:[]});
  S.days.push({id:'d'+Date.now(),date,title,tasks});
  S.showDayForm=false; save();
};
window.sendMsg = () => {
  const inp=$('ci'); const txt=inp.value.trim(); if(!txt) return;
  S.msgs.push({type:'coach',text:txt}); inp.value=''; save();
};

// ── LIGHTBOX ──
window.openLb = src => { $('lb-img').src=src; $('lb').classList.remove('hidden'); };
window.closeLb = () => { $('lb').classList.add('hidden'); $('lb-img').src=''; };

// ── BOOT ──
show('vA');
rA();
</script>
</body>
</html>
