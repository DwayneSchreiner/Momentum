<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Momentum">
<title>Momentum</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#F5F0E8;--sand2:#EDE8DF;--white:#FDFCFA;
  --ink:#1C1917;--muted:#8C8478;--dim:#B8B0A4;
  --orange:#E85D26;--ol:rgba(232,93,38,0.09);--om:rgba(232,93,38,0.22);
  --green:#2A7A55;--gl:rgba(42,122,85,0.09);
  --red:#C0392B;--rl:rgba(192,57,43,0.09);
  --bo:rgba(28,25,23,0.08);--bm:rgba(28,25,23,0.14);
  --sh:0 2px 16px rgba(28,25,23,0.06);
  --shm:0 8px 32px rgba(28,25,23,0.1);
  --r:16px;--rs:10px;--rx:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Epilogue',sans-serif;background:var(--sand);color:var(--ink);display:flex;flex-direction:column;height:100dvh;overflow:hidden}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 14px;background:var(--white);border-bottom:1px solid var(--bo);flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.logo em{color:var(--orange);font-style:normal}
.pill-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:100px;border:1.5px solid var(--bm);background:transparent;font-family:'Epilogue',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;letter-spacing:.01em}
.pill-btn:hover{border-color:var(--orange);color:var(--orange);background:var(--ol)}
.pill-btn .dot{width:6px;height:6px;border-radius:50%;background:var(--orange);flex-shrink:0}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--sand)}
.scroll-area::-webkit-scrollbar{display:none}
.page{padding:0 0 120px}

/* QUOTE */
.hero-quote{background:var(--white);margin:16px 18px 0;border-radius:var(--r);padding:18px 20px 16px;position:relative;overflow:hidden;border:1px solid var(--bo);box-shadow:var(--sh)}
.hero-quote::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--orange),#F5A623)}
.q-eye{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--orange);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.q-eye::after{content:'';flex:1;height:1px;background:var(--om)}
.q-text{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;line-height:1.5;color:var(--ink);letter-spacing:-.01em}
.q-author{font-size:11px;color:var(--muted);margin-top:10px;font-style:normal;font-weight:400;letter-spacing:.02em}
.q-deco{font-family:'Syne',sans-serif;font-size:90px;font-weight:800;color:var(--orange);opacity:.06;position:absolute;bottom:-24px;right:14px;line-height:1;pointer-events:none}

/* GREETING */
.greeting-strip{padding:18px 20px 0;display:flex;align-items:flex-end;justify-content:space-between}
.g-name{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.03em;color:var(--ink);line-height:1}
.g-name span{color:var(--orange)}
.g-sub{font-size:13px;color:var(--muted);margin-top:5px;font-weight:300}
.streak{background:var(--ol);border:1.5px solid var(--om);border-radius:100px;padding:6px 12px;font-size:11px;font-weight:600;color:var(--orange);white-space:nowrap;margin-bottom:3px}

/* DAY CHIPS */
.chips-wrap{padding:14px 20px 0}
.chips-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 13px;border-radius:100px;border:1.5px solid var(--bm);background:var(--white);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap}
.chip.active{background:var(--orange);border-color:var(--orange);color:#fff;box-shadow:0 3px 10px rgba(232,93,38,0.25)}

/* DAY CARD */
.day-card{margin:12px 18px 0;background:var(--white);border-radius:var(--r);border:1px solid var(--bo);overflow:hidden;box-shadow:var(--sh)}
.dc-head{padding:18px 20px 14px;border-bottom:1px solid var(--bo)}
.dc-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.02em;color:var(--ink);margin-bottom:12px}
.dc-meta{display:flex;align-items:center;gap:12px}
.prog-track{flex:1}
.prog-nums{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500}
.prog-bar{height:4px;background:var(--sand2);border-radius:100px;overflow:hidden}
.prog-fill{height:100%;background:var(--orange);border-radius:100px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.prog-pct{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--muted);letter-spacing:-.02em;line-height:1;flex-shrink:0}

/* TASKS */
.task-list{padding:4px 0}
.task-row{display:flex;align-items:flex-start;gap:12px;padding:13px 18px;border-bottom:1px solid var(--bo);transition:background .15s}
.task-row:last-child{border-bottom:none}
.task-row.done{background:var(--gl)}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--bm);background:transparent;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer}
.task-row.done .chk{background:var(--green);border-color:var(--green)}
.chk svg{display:none}
.task-row.done .chk svg{display:block}
.task-body{flex:1;min-width:0}
.task-title-text{font-size:14px;font-weight:500;color:var(--ink);line-height:1.4}
.task-row.done .task-title-text{text-decoration:line-through;color:var(--dim)}
.task-note-text{font-size:12px;color:var(--muted);margin-top:3px;font-weight:300}
.photo-strip{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;align-items:center}
.ph-thumb{width:44px;height:44px;border-radius:var(--rx);object-fit:cover;border:1px solid var(--bo)}
.ph-add{width:44px;height:44px;border-radius:var(--rx);border:1.5px dashed var(--bm);background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;color:var(--dim);cursor:pointer;font-size:14px;transition:all .15s}
.ph-add:hover{border-color:var(--orange);color:var(--orange)}
.ph-add-inline{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);cursor:pointer;font-weight:500;letter-spacing:.02em;padding:3px 0}
.ph-add-inline:hover{color:var(--orange)}
.ph-add small{font-size:8px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
input[type=file]{display:none}
.del-btn{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:0;transition:all .15s;padding:0}
.del-btn:hover{background:var(--rl);color:var(--red)}

/* ADD TASK TRIGGER */
.add-trigger{margin:10px 18px 0;display:flex;align-items:center;gap:10px;padding:13px 16px;border-radius:var(--rs);border:1.5px dashed var(--bm);background:transparent;cursor:pointer;transition:all .15s;width:calc(100% - 36px)}
.add-trigger:hover{border-color:var(--orange);background:var(--ol)}
.add-trigger span{font-size:13px;color:var(--muted);font-weight:400}
.add-ico{width:24px;height:24px;border-radius:50%;background:var(--sand2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);flex-shrink:0;transition:all .15s}
.add-trigger:hover .add-ico{background:var(--orange);color:#fff}

/* FORM */
.form-sheet{margin:10px 18px 0;background:var(--white);border-radius:var(--r);border:1px solid var(--bo);padding:18px;box-shadow:var(--shm)}
.form-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--orange);margin-bottom:11px;display:block}
.f-in{width:100%;padding:11px 13px;border:1.5px solid var(--bm);border-radius:var(--rs);background:var(--sand);font-family:'Epilogue',sans-serif;font-size:13px;color:var(--ink);outline:none;margin-bottom:9px;transition:border-color .15s}
.f-in:focus{border-color:var(--orange);background:var(--white)}
.f-in::placeholder{color:var(--dim)}
.form-btns{display:flex;gap:8px;margin-top:4px}
.btn-save{padding:10px 20px;background:var(--orange);color:#fff;border:none;border-radius:100px;font-family:'Epilogue',sans-serif;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(232,93,38,0.28);transition:all .2s}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,93,38,0.36)}
.btn-ghost{padding:10px 16px;background:transparent;color:var(--muted);border:1.5px solid var(--bm);border-radius:100px;font-family:'Epilogue',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink)}

/* MESSAGES */
.msg-sec{margin:18px 18px 0}
.sec-eye{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:11px;display:flex;align-items:center;gap:8px}
.sec-eye::after{content:'';flex:1;height:1px;background:var(--bm)}
.msg-list{display:flex;flex-direction:column;gap:7px;margin-bottom:11px}
.msg-b{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;max-width:84%;font-weight:400}
.msg-coach{background:var(--orange);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;font-weight:500}
.msg-system{background:var(--white);color:var(--muted);align-self:flex-start;border:1px solid var(--bm);border-bottom-left-radius:4px;font-style:italic}

/* COACH STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:18px 18px 0;max-width:800px;margin-left:auto;margin-right:auto}
.stat-tile{background:var(--white);border:1px solid var(--bo);border-radius:var(--rs);padding:16px 10px;text-align:center;box-shadow:var(--sh);cursor:default}
.stat-big{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--orange);letter-spacing:-.03em;line-height:1}
.stat-sm{font-size:10px;color:var(--dim);margin-top:5px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}

/* OVERVIEW */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:9px;margin:14px 18px 0;max-width:800px;margin-left:auto;margin-right:auto}
.ov-tile{background:var(--white);border:1px solid var(--bo);border-radius:var(--rs);padding:13px;cursor:pointer;transition:all .2s;box-shadow:var(--sh);position:relative;overflow:hidden}
.ov-tile::after{content:'';position:absolute;bottom:0;left:0;height:3px;width:0%;background:var(--orange);transition:width .3s}
.ov-tile.prog::after{background:var(--orange)}
.ov-tile.done-all::after{background:var(--green)}
.ov-tile:hover{transform:translateY(-2px);box-shadow:var(--shm)}
.ov-date{font-size:10px;color:var(--dim);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
.ov-title{font-size:12px;font-weight:600;color:var(--ink);line-height:1.35;margin-bottom:8px}
.ov-bar{height:2px;background:var(--sand2);margin-bottom:4px;border-radius:2px;overflow:hidden}
.ov-fill{height:100%;background:var(--orange);border-radius:2px}
.ov-count{font-size:10px;color:var(--muted)}

/* ADD DAY */
.add-day-trigger{margin:10px auto 0;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:var(--rs);border:1.5px dashed var(--bm);background:transparent;cursor:pointer;width:calc(100% - 36px);max-width:764px;font-family:'Epilogue',sans-serif;font-size:13px;color:var(--muted);transition:all .15s}
.add-day-trigger:hover{border-color:var(--orange);color:var(--orange);background:var(--ol)}

/* MSG COMPOSE */
.msg-compose{margin:12px 18px 0;display:flex;gap:8px;align-items:center}
.msg-compose input{flex:1;padding:12px 17px;border:1.5px solid var(--bm);border-radius:100px;background:var(--white);font-family:'Epilogue',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color .15s;box-shadow:var(--sh)}
.msg-compose input:focus{border-color:var(--orange)}
.msg-compose input::placeholder{color:var(--dim)}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--orange);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(232,93,38,0.28);transition:all .2s}
.send-btn:hover{transform:scale(1.08)}

/* PIN */
.pin-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:75vh;padding:40px 30px;text-align:center}
.pin-logo{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--orange);margin-bottom:8px}
.pin-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.02em;color:var(--ink);margin-bottom:6px}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:32px;font-weight:300}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pd{width:14px;height:14px;border-radius:50%;border:2px solid var(--bm);background:transparent;transition:all .2s}
.pd.on{background:var(--orange);border-color:var(--orange);transform:scale(1.1)}
.pd.err{background:var(--red);border-color:var(--red)}
.pin-grid{display:grid;grid-template-columns:repeat(3,70px);gap:9px;justify-content:center;margin-bottom:12px}
.pk{width:70px;height:60px;background:var(--white);border:1.5px solid var(--bo);border-radius:var(--rs);font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;box-shadow:var(--sh)}
.pk:hover{border-color:var(--orange);color:var(--orange);background:var(--ol)}
.pk:active{transform:scale(0.95)}
.pk.del{font-size:16px;color:var(--muted)}
.pin-err{font-size:12px;color:var(--red);font-weight:500;height:18px}

.lightbox{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.lightbox img{max-width:100%;max-height:90vh;border-radius:var(--rs);object-fit:contain}
.lightbox-close{position:fixed;top:16px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.hidden{display:none!important}
.divider{height:1px;background:var(--bo);margin:18px 0}
</style>
</head>

function compressImage(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = url;
  });
}

window.addPh = async (ti, input) => {
  const files = Array.from(input.files);
  if (!files.length) return;
  const task = S.days[S.dayIdx].tasks[ti];
  const remaining = 5 - (task.photos ? task.photos.length : 0);
  if (remaining <= 0) { alert('Maximaal 5 fotos per taak.'); return; }
  const toAdd = files.slice(0, remaining);
  for (const f of toAdd) {
    try {
      const compressed = await compressImage(f, 400, 0.5);
      S.days[S.dayIdx].tasks[ti].photos.push(compressed);
    } catch(e) {
      console.error('Compressie mislukt:', e);
    }
  }
  save();
};
