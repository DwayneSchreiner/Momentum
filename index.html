<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Momentum">
<title>Momentum</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111110;
  --bg2: #1A1A18;
  --bg3: #222220;
  --bg4: #2A2A28;
  --accent: #C8A96E;
  --accent2: #A8834A;
  --accent-dim: rgba(200,169,110,0.15);
  --text: #E8E6E0;
  --text-muted: #888880;
  --text-dim: #555550;
  --border: rgba(200,169,110,0.12);
  --border-strong: rgba(200,169,110,0.25);
  --green: #4A8C6A;
  --red: #8C4A4A;
  --radius: 4px;
  --radius-md: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'Barlow', sans-serif; color: var(--text); display: flex; flex-direction: column; height: 100dvh; }

.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); }
.coach-btn, .back-btn { padding: 7px 16px; background: transparent; border: 1px solid var(--border-strong); border-radius: var(--radius); color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: all .2s; }
.coach-btn:hover, .back-btn:hover { border-color: var(--accent); color: var(--accent); }

.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.scroll-area::-webkit-scrollbar { display: none; }
.inner { padding: 20px 20px 100px; }

.quote-block { border-left: 3px solid var(--accent); padding: 16px 18px; background: var(--bg2); margin-bottom: 24px; position: relative; }
.quote-mark { font-family: 'Barlow Condensed', sans-serif; font-size: 64px; line-height: 1; color: var(--accent); opacity: 0.2; position: absolute; top: 4px; left: 12px; }
.quote-text { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 400; line-height: 1.5; color: var(--text); font-style: italic; padding-left: 8px; position: relative; z-index: 1; }
.quote-label { font-size: 10px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-top: 10px; padding-left: 8px; }

.greeting-block { margin-bottom: 24px; }
.greeting-name { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--text); line-height: 1; }
.greeting-sub { font-size: 13px; color: var(--text-muted); margin-top: 6px; font-weight: 300; letter-spacing: .02em; }

.day-nav-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.day-main { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--text); line-height: 1.2; }
.day-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; gap: 8px; }
.tag { display: inline-block; padding: 2px 7px; font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; border-radius: var(--radius); }
.tag-today { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--border-strong); }
.tag-other { background: var(--bg3); color: var(--text-dim); border: 1px solid var(--border); }
.nav-arrows { display: flex; gap: 6px; flex-shrink: 0; margin-top: 2px; }
.nav-arrow { width: 32px; height: 32px; border: 1px solid var(--border-strong); background: transparent; color: var(--accent); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: var(--radius); transition: all .15s; }
.nav-arrow:hover { background: var(--accent-dim); }
.nav-arrow:disabled { opacity: 0.2; cursor: default; }

.progress-wrap { margin-bottom: 20px; }
.progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; letter-spacing: .03em; text-transform: uppercase; }
.progress-bar { height: 3px; background: var(--bg4); overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); transition: width .4s ease; }

.task-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.task-card { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--bg4); padding: 14px; transition: all .2s; }
.task-card.done { border-left-color: var(--green); background: rgba(74,140,106,0.06); }
.task-top { display: flex; align-items: flex-start; gap: 12px; }
.check-box { width: 20px; height: 20px; border: 1.5px solid var(--text-dim); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; transition: all .2s; border-radius: 2px; }
.check-box.checked { background: var(--green); border-color: var(--green); }
.check-box svg { display: none; }
.check-box.checked svg { display: block; }
.task-body { flex: 1; }
.task-name { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; }
.task-card.done .task-name { text-decoration: line-through; color: var(--text-dim); }
.task-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 300; }
.photo-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.photo-thumb { width: 54px; height: 54px; object-fit: cover; border: 1px solid var(--border); border-radius: var(--radius); }
.photo-add { width: 54px; height: 54px; border: 1px dashed var(--border-strong); background: transparent; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; color: var(--text-dim); border-radius: var(--radius); font-size: 18px; transition: all .15s; }
.photo-add:hover { border-color: var(--accent); color: var(--accent); }
.photo-add small { font-size: 9px; letter-spacing: .06em; text-transform: uppercase; font-weight: 600; }
input[type=file] { display: none; }

.btn-add-task { width: 100%; padding: 12px; border: 1px dashed var(--border-strong); background: transparent; color: var(--text-dim); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; margin-bottom: 20px; transition: all .15s; border-radius: var(--radius); }
.btn-add-task:hover { border-color: var(--accent); color: var(--accent); }

.form-card { background: var(--bg2); border: 1px solid var(--border-strong); padding: 16px; margin-bottom: 16px; border-radius: var(--radius-md); }
.form-title { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
.form-input { width: 100%; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px; margin-bottom: 8px; outline: none; border-radius: var(--radius); transition: border-color .15s; }
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text-dim); }
.form-row { display: flex; gap: 8px; }
.btn-primary { padding: 9px 18px; background: var(--accent); color: var(--bg); border: none; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; border-radius: var(--radius); }
.btn-primary:hover { background: var(--accent2); }
.btn-cancel { padding: 9px 14px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; border-radius: var(--radius); }

.section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }
.msg-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.msg-bubble { padding: 9px 13px; font-size: 13px; line-height: 1.5; max-width: 85%; border-radius: var(--radius-md); }
.msg-coach { background: var(--accent); color: var(--bg); align-self: flex-end; font-weight: 500; }
.msg-system { background: var(--bg3); color: var(--text-muted); align-self: flex-start; border: 1px solid var(--border); }
.msg-input-row { display: flex; gap: 8px; }
.msg-input { flex: 1; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px; outline: none; border-radius: 20px; transition: border-color .15s; }
.msg-input:focus { border-color: var(--accent); }
.msg-input::placeholder { color: var(--text-dim); }
.btn-send { padding: 10px 18px; background: var(--accent); color: var(--bg); border: none; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; border-radius: 20px; }

.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); padding: 14px 10px; text-align: center; border-radius: var(--radius-md); }
.stat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; color: var(--accent); line-height: 1; letter-spacing: .02em; }
.stat-lbl { font-size: 10px; color: var(--text-dim); margin-top: 4px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }

.overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.ov-card { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--bg4); padding: 12px; cursor: pointer; transition: all .2s; }
.ov-card:hover { background: var(--bg3); }
.ov-card.has-progress { border-left-color: var(--accent2); }
.ov-card.all-done { border-left-color: var(--green); }
.ov-date { font-size: 10px; color: var(--text-dim); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 4px; }
.ov-title { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
.ov-bar { height: 2px; background: var(--bg4); margin-bottom: 5px; }
.ov-fill { height: 100%; background: var(--accent); }
.ov-count { font-size: 10px; color: var(--text-dim); font-weight: 500; }

.btn-add-day { width: 100%; padding: 12px; border: 1px dashed var(--border-strong); background: transparent; color: var(--text-dim); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; margin-bottom: 20px; transition: all .15s; border-radius: var(--radius); }
.btn-add-day:hover { border-color: var(--accent); color: var(--accent); }

/* PIN SCREEN */
.pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px 30px; text-align: center; min-height: 70vh; }
.pin-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--text); margin-bottom: 6px; }
.pin-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 36px; font-weight: 300; }
.pin-dots { display: flex; gap: 16px; margin-bottom: 36px; justify-content: center; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border-strong); background: transparent; transition: all .2s; }
.pin-dot.filled { background: var(--accent); border-color: var(--accent); }
.pin-dot.error { background: var(--red); border-color: var(--red); }
.pin-grid { display: grid; grid-template-columns: repeat(3, 68px); gap: 10px; justify-content: center; margin-bottom: 16px; }
.pin-key { width: 68px; height: 58px; background: var(--bg2); border: 1px solid var(--border); color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 600; cursor: pointer; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; transition: all .15s; }
.pin-key:hover { background: var(--bg3); border-color: var(--border-strong); }
.pin-key:active { background: var(--accent-dim); border-color: var(--accent); }
.pin-key.del { font-size: 16px; color: var(--text-muted); }
.pin-error { font-size: 12px; color: var(--red); font-weight: 500; letter-spacing: .04em; height: 18px; margin-top: 4px; }

.divider { height: 1px; background: var(--border); margin: 20px 0; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Momentum</div>
  <div id="topbar-right">
    <button class="coach-btn" onclick="openCoach()">Coach</button>
  </div>
</div>

<div class="scroll-area">
  <div class="inner" id="view-arthur"></div>
  <div class="inner hidden" id="view-pin">
    <div class="pin-screen">
      <div class="pin-title">Coach toegang</div>
      <div class="pin-sub">Voer de pincode in om verder te gaan</div>
      <div class="pin-dots" id="pin-dots">
        <div class="pin-dot" id="pd0"></div>
        <div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div>
        <div class="pin-dot" id="pd3"></div>
      </div>
      <div class="pin-grid">
        <button class="pin-key" onclick="pinPress('1')">1</button>
        <button class="pin-key" onclick="pinPress('2')">2</button>
        <button class="pin-key" onclick="pinPress('3')">3</button>
        <button class="pin-key" onclick="pinPress('4')">4</button>
        <button class="pin-key" onclick="pinPress('5')">5</button>
        <button class="pin-key" onclick="pinPress('6')">6</button>
        <button class="pin-key" onclick="pinPress('7')">7</button>
        <button class="pin-key" onclick="pinPress('8')">8</button>
        <button class="pin-key" onclick="pinPress('9')">9</button>
        <button class="pin-key" style="opacity:0;cursor:default"></button>
        <button class="pin-key" onclick="pinPress('0')">0</button>
        <button class="pin-key del" onclick="pinDel()">&#9003;</button>
      </div>
      <div class="pin-error" id="pin-error"></div>
    </div>
  </div>
  <div class="inner hidden" id="view-dwayne"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBpRIE2lUeenkMV2EF0z6fh2AaV1TFw8WA",
  authDomain: "arthur-334f6.firebaseapp.com",
  projectId: "arthur-334f6",
  storageBucket: "arthur-334f6.firebasestorage.app",
  messagingSenderId: "814012246386",
  appId: "1:814012246386:web:11943c6942328cabbc15eb"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const DOCREF = doc(db, "planning", "arthur");

const PIN = "1234";
let pinBuffer = "";
let pinUnlocked = false;

const QUOTES = [
  "Jij bouwt niet alleen muren — je bouwt een nieuw leven. Steen voor steen, dag voor dag.",
  "De moed om opnieuw te beginnen is de krachtigste eigenschap die een mens bezit.",
  "Elke dag dat je opstaat en doorgaat, bewijs je aan jezelf wie je werkelijk bent.",
  "Groei begint precies op het punt waar comfort eindigt. Jij bent al voorbij dat punt.",
  "Je bent niet gebroken. Je bent aan het worden wie je altijd al had kunnen zijn.",
  "Het zwaarste moment is niet de val — het is de keuze om toch op te staan. Jij staat op.",
  "Wat je nu bouwt wordt ooit de plek waar jij in vrede zit. Dat is de moeite waard.",
  "Kracht is niet het afwezig zijn van pijn. Kracht is verder gaan terwijl je pijn voelt.",
  "Een nieuw hoofdstuk begint niet als alles klaar is. Het begint als jij besluit te starten.",
  "Je hebt al bewezen dat je het kan. Vandaag bewijs je het opnieuw.",
  "De mooiste versie van jezelf wordt gevormd in de moeilijkste momenten.",
  "Jij verdient een thuis waar rust en trots samenkomen. Je bent er bijna."
];

const sessionQuote = QUOTES[Math.floor(Math.random() * QUOTES.length)];

const DEFAULT_DAYS = [
  { id:"dag1", label:"Dag 1", date:"Ma 17 mrt", title:"Garage: basis voorbereiden",
    tasks:[
      {id:"t1",title:"Afvoer en waterleiding inspecteren",note:"Controleer op lekkage, zet markering",done:false,photos:[]},
      {id:"t2",title:"Vloer opmeten en materiaallijst maken",note:"Noteer afmetingen in cm",done:false,photos:[]},
      {id:"t3",title:"Gereedschap klaarleggen",note:"Zie eerder gemaakte lijst",done:false,photos:[]}
    ]},
  { id:"dag2", label:"Dag 2", date:"Wo 19 mrt", title:"Garage: wanden en isolatie",
    tasks:[
      {id:"t1",title:"Isolatiemateriaal ophalen",note:"Bouwmarkt, lijst meenemen",done:false,photos:[]},
      {id:"t2",title:"Eerste wand isoleren",note:"Begin met de buitenmuur",done:false,photos:[]},
      {id:"t3",title:"Tweede wand isoleren",note:"",done:false,photos:[]}
    ]},
  { id:"dag3", label:"Dag 3", date:"Za 22 mrt", title:"Garage: elektra voorbereiden",
    tasks:[
      {id:"t1",title:"Elektricien bellen voor offerte",note:"Nodig voor keuken en badkamer",done:false,photos:[]},
      {id:"t2",title:"Leidingen tracé uittekenen",note:"",done:false,photos:[]}
    ]},
  { id:"dag4", label:"Dag 4", date:"Ma 24 mrt", title:"Garage: gietvloer storten",
    tasks:[
      {id:"t1",title:"Ondergrond egaliseren",note:"",done:false,photos:[]},
      {id:"t2",title:"Gietvloer bestellen of storten",note:"Min. 24u droogtijd inplannen",done:false,photos:[]}
    ]}
];

let state = {
  currentDayIndex: 0,
  showAddTask: false,
  showAddDay: false,
  days: JSON.parse(JSON.stringify(DEFAULT_DAYS)),
  messages: [{type:'system', text:'Dwayne stuurt hier berichten voor jou, Arthur!'}]
};

async function initData() {
  const snap = await getDoc(DOCREF);
  if (!snap.exists()) await setDoc(DOCREF, { days: state.days, messages: state.messages });
}

function listenToFirestore() {
  onSnapshot(DOCREF, snap => {
    if (snap.exists()) {
      const data = snap.data();
      state.days = data.days || state.days;
      state.messages = data.messages || state.messages;
      if (!document.getElementById('view-arthur').classList.contains('hidden')) renderArthur();
      if (!document.getElementById('view-dwayne').classList.contains('hidden')) renderDwayne();
    }
  });
}

async function save() {
  try { await setDoc(DOCREF, { days: state.days, messages: state.messages }); } catch(e) {}
}

function showView(v) {
  ['view-arthur','view-pin','view-dwayne'].forEach(id =>
    document.getElementById(id).classList.toggle('hidden', id !== v)
  );
  document.getElementById('topbar-right').innerHTML = v === 'view-arthur'
    ? `<button class="coach-btn" onclick="openCoach()">Coach</button>`
    : `<button class="back-btn" onclick="goBack()">&#8592; Terug</button>`;
}

window.goBack = () => { pinBuffer=""; pinUnlocked=false; renderArthur(); showView('view-arthur'); };
window.openCoach = () => {
  if (pinUnlocked) { renderDwayne(); showView('view-dwayne'); }
  else { pinBuffer=""; updatePinDots(); showView('view-pin'); }
};

window.pinPress = d => {
  if (!d || pinBuffer.length >= 4) return;
  pinBuffer += d;
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 150);
};
window.pinDel = () => {
  pinBuffer = pinBuffer.slice(0,-1);
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
};

function updatePinDots(error) {
  for (let i=0;i<4;i++) {
    const d = document.getElementById('pd'+i);
    d.classList.toggle('filled', i < pinBuffer.length && !error);
    d.classList.toggle('error', !!error);
  }
}
function checkPin() {
  if (pinBuffer === PIN) {
    pinUnlocked = true;
    renderDwayne();
    showView('view-dwayne');
  } else {
    updatePinDots(true);
    document.getElementById('pin-error').textContent = 'Verkeerde pincode, probeer opnieuw';
    setTimeout(() => { pinBuffer=""; updatePinDots(false); document.getElementById('pin-error').textContent=''; }, 1200);
  }
}

function renderArthur() {
  const day = state.days[state.currentDayIndex]; if(!day) return;
  const done = day.tasks.filter(t=>t.done).length;
  const total = day.tasks.length;
  const pct = total ? Math.round(done/total*100) : 0;

  const tasksHtml = day.tasks.map((t,ti) => `
    <div class="task-card${t.done?' done':''}">
      <div class="task-top">
        <div class="check-box${t.done?' checked':''}" onclick="toggleTask(${ti})">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" stroke="#111110" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="task-body">
          <div class="task-name">${t.title}</div>
          ${t.note?`<div class="task-hint">${t.note}</div>`:''}
        </div>
      </div>
      <div class="photo-row">
        ${t.photos.map(p=>`<img class="photo-thumb" src="${p}">`).join('')}
        <label class="photo-add"><span>+</span><small>foto</small><input type="file" accept="image/*" onchange="addPhoto(${ti},this)"></label>
      </div>
    </div>`).join('');

  const msgsHtml = state.messages.map(m=>`<div class="msg-bubble msg-${m.type}">${m.text}</div>`).join('');

  document.getElementById('view-arthur').innerHTML = `
    <div class="greeting-block">
      <div class="greeting-name">Hey Arthur.</div>
      <div class="greeting-sub">Kleine stappen. Grote impact.</div>
    </div>
    <div class="quote-block">
      <div class="quote-mark">"</div>
      <div class="quote-text">${sessionQuote}</div>
      <div class="quote-label">Jouw quote voor vandaag</div>
    </div>
    <div class="day-nav-row">
      <div>
        <div class="day-main">${day.title}</div>
        <div class="day-sub">${day.date}<span class="tag ${state.currentDayIndex===0?'tag-today':'tag-other'}">${state.currentDayIndex===0?'Vandaag':'Andere dag'}</span></div>
      </div>
      <div class="nav-arrows">
        <button class="nav-arrow" onclick="navDay(-1)" ${state.currentDayIndex===0?'disabled':''}>&#8592;</button>
        <button class="nav-arrow" onclick="navDay(1)" ${state.currentDayIndex===state.days.length-1?'disabled':''}>&#8594;</button>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-meta"><span>${done} / ${total} taken</span><span>${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="task-list">${tasksHtml}</div>
    ${state.showAddTask?`
    <div class="form-card">
      <div class="form-title">Taak toevoegen</div>
      <input class="form-input" id="new-task-title" placeholder="Omschrijving taak" />
      <input class="form-input" id="new-task-note" placeholder="Toelichting (optioneel)" />
      <div class="form-row">
        <button class="btn-primary" onclick="saveNewTask()">Toevoegen</button>
        <button class="btn-cancel" onclick="cancelTask()">Annuleren</button>
      </div>
    </div>`:`<button class="btn-add-task" onclick="showAddTaskFn()">+ Taak toevoegen</button>`}
    <div class="divider"></div>
    <div class="section-title">Berichten van Dwayne</div>
    <div class="msg-list">${msgsHtml}</div>
  `;
}

function renderDwayne() {
  const totalTasks = state.days.reduce((a,d)=>a+d.tasks.length,0);
  const doneTasks = state.days.reduce((a,d)=>a+d.tasks.filter(t=>t.done).length,0);
  const pct = totalTasks ? Math.round(doneTasks/totalTasks*100) : 0;

  const ovHtml = state.days.map((d,i)=>{
    const done = d.tasks.filter(t=>t.done).length;
    const total = d.tasks.length;
    const p = total ? Math.round(done/total*100) : 0;
    const cls = done===total&&total>0?'all-done':done>0?'has-progress':'';
    return `<div class="ov-card ${cls}" onclick="jumpToDay(${i})">
      <div class="ov-date">${d.date}</div>
      <div class="ov-title">${d.title}</div>
      <div class="ov-bar"><div class="ov-fill" style="width:${p}%"></div></div>
      <div class="ov-count">${done}/${total} klaar</div>
    </div>`;
  }).join('');

  const msgsHtml = state.messages.map(m=>`<div class="msg-bubble msg-${m.type}">${m.text}</div>`).join('');

  document.getElementById('view-dwayne').innerHTML = `
    <div class="greeting-block">
      <div class="greeting-name">Coach Dwayne.</div>
      <div class="greeting-sub">Arthur's voortgang in één oogopslag.</div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${doneTasks}</div><div class="stat-lbl">Klaar</div></div>
      <div class="stat-card"><div class="stat-num">${totalTasks}</div><div class="stat-lbl">Totaal</div></div>
      <div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-lbl">Voortgang</div></div>
    </div>
    <div class="section-title">Dagplanning Arthur</div>
    <div class="overview-grid">${ovHtml}</div>
    ${state.showAddDay?`
    <div class="form-card">
      <div class="form-title">Nieuwe dag toevoegen</div>
      <input class="form-input" id="new-day-title" placeholder="Onderwerp (bv. Badkamer: tegels)" />
      <input class="form-input" id="new-day-date" placeholder="Datum (bv. Ma 31 mrt)" />
      <input class="form-input" id="new-day-t1" placeholder="Taak 1" />
      <input class="form-input" id="new-day-t2" placeholder="Taak 2 (optioneel)" />
      <input class="form-input" id="new-day-t3" placeholder="Taak 3 (optioneel)" />
      <div class="form-row">
        <button class="btn-primary" onclick="saveNewDay()">Toevoegen</button>
        <button class="btn-cancel" onclick="cancelDay()">Annuleren</button>
      </div>
    </div>`:`<button class="btn-add-day" onclick="showAddDayFn()">+ Dag toevoegen aan planning</button>`}
    <div class="divider"></div>
    <div class="section-title">Stuur een bericht aan Arthur</div>
    <div class="msg-list">${msgsHtml}</div>
    <div class="msg-input-row">
      <input class="msg-input" id="coach-input" placeholder="Schrijf een motivatiebericht..." onkeydown="if(event.key==='Enter')sendMsg()" />
      <button class="btn-send" onclick="sendMsg()">Stuur</button>
    </div>
  `;
}

window.toggleTask = ti => { state.days[state.currentDayIndex].tasks[ti].done=!state.days[state.currentDayIndex].tasks[ti].done; save(); };
window.addPhoto = (ti,input) => { const f=input.files[0];if(!f)return; const r=new FileReader(); r.onload=e=>{state.days[state.currentDayIndex].tasks[ti].photos.push(e.target.result);save();}; r.readAsDataURL(f); };
window.navDay = d => { state.currentDayIndex=Math.max(0,Math.min(state.days.length-1,state.currentDayIndex+d)); renderArthur(); };
window.jumpToDay = i => { state.currentDayIndex=i; renderArthur(); showView('view-arthur'); };
window.showAddTaskFn = () => { state.showAddTask=true; renderArthur(); };
window.cancelTask = () => { state.showAddTask=false; renderArthur(); };
window.saveNewTask = () => {
  const title=document.getElementById('new-task-title').value.trim(); if(!title)return;
  const note=document.getElementById('new-task-note').value.trim();
  state.days[state.currentDayIndex].tasks.push({id:'t'+Date.now(),title,note,done:false,photos:[]});
  state.showAddTask=false; save();
};
window.showAddDayFn = () => { state.showAddDay=true; renderDwayne(); };
window.cancelDay = () => { state.showAddDay=false; renderDwayne(); };
window.saveNewDay = () => {
  const title=document.getElementById('new-day-title').value.trim(); if(!title)return;
  const date=document.getElementById('new-day-date').value.trim();
  const tasks=[];
  ['new-day-t1','new-day-t2','new-day-t3'].forEach(id=>{const v=document.getElementById(id).value.trim();if(v)tasks.push({id:'t'+Date.now()+Math.random(),title:v,note:'',done:false,photos:[]});});
  if(!tasks.length)tasks.push({id:'t'+Date.now(),title:'Werkzaamheden invullen',note:'',done:false,photos:[]});
  state.days.push({id:'dag'+Date.now(),label:`Dag ${state.days.length+1}`,date:date||'Datum volgt',title,tasks});
  state.showAddDay=false; save();
};
window.sendMsg = () => {
  const input=document.getElementById('coach-input');
  const txt=input.value.trim(); if(!txt)return;
  state.messages.push({type:'coach',text:txt});
  input.value=''; save();
};

initData().then(() => listenToFirestore());
renderArthur();
showView('view-arthur');
</script>
</body>
</html>
